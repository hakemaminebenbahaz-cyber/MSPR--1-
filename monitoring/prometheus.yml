global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Métriques de l'API FastAPI
  - job_name: 'obrail-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  # Métriques de Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
