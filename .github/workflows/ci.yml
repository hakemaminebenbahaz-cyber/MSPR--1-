name: ObRail CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ═══════════════════════════════════════════════════════════
  # 1. TESTS API (avec PostgreSQL local — pas de dépendance Azure)
  # ═══════════════════════════════════════════════════════════
  test-api:
    name: Tests API (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: obrail-test
          POSTGRES_USER: railadmin
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://railadmin:testpassword@localhost:5432/obrail-test?sslmode=disable
      API_KEY: obrail-api-key-2026
      SECRET_KEY: test-secret-key
      DOCKER_ENV: "true"

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: api/requirements.txt

      - name: Installation dépendances API
        run: pip install -r api/requirements.txt pytest httpx pytest-cov

      - name: Initialisation du schéma de test
        run: psql $DATABASE_URL -f database/schema.sql

      - name: Chargement des données de test
        run: psql $DATABASE_URL -f database/fixtures_test.sql

      - name: Lancement des tests API avec couverture
        working-directory: api
        run: pytest tests_endpoint/test_endpoint.py -v --tb=short --cov=. --cov-report=term-missing

  # ═══════════════════════════════════════════════════════════
  # 2. BUILD DASHBOARD
  # ═══════════════════════════════════════════════════════════
  build-dashboard:
    name: Build Dashboard (React/TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Installation dépendances (reproductible)
        working-directory: dashboard
        run: npm ci

      - name: Build production
        working-directory: dashboard
        run: npm run build

  # ═══════════════════════════════════════════════════════════
  # 3. TESTS E2E (Playwright — frontend + API)
  # ═══════════════════════════════════════════════════════════
  test-e2e:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [test-api, build-dashboard]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Démarrage de la stack Docker
        run: |
          cp .env.example .env
          docker compose up -d postgres api dashboard
          sleep 20

      - name: Vérification services actifs
        run: |
          curl -f http://localhost:8001/health || exit 1
          curl -f http://localhost:3002 || exit 1

      - name: Chargement fixtures dans Docker PostgreSQL
        run: |
          docker compose exec -T postgres psql -U railadmin -d obrail-db -f /dev/stdin < database/fixtures_test.sql

      - name: Installation dépendances Playwright
        working-directory: e2e
        run: npm install

      - name: Installation navigateur Chromium
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Lancement tests E2E
        working-directory: e2e
        run: npx playwright test

      - name: Upload rapport Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/report/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # 4. DOCKER BUILD — vérifie que toutes les images se construisent
  # ═══════════════════════════════════════════════════════════
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [test-api, build-dashboard, test-e2e]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de toutes les images Docker
        run: docker compose build --no-cache

      - name: Vérification que les services démarrent
        run: |
          docker compose up -d postgres api
          sleep 15
          docker compose ps
          curl -f http://localhost:8001/health || exit 1
          docker compose down

  # ═══════════════════════════════════════════════════════════
  # 5. DÉPLOIEMENT AZURE — push images sur ACR
  # ═══════════════════════════════════════════════════════════
  deploy-azure:
    name: Déploiement Azure (ACR)
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build et push image API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/obrail-api:latest

      - name: Build et push image Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: dashboard/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/obrail-dashboard:latest
