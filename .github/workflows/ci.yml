name: ObRail CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════
  # 1. TESTS API
  # ═══════════════════════════════════════════════════════════
  test-api:
    name: Tests API (pytest)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installation dépendances API
        run: pip install -r api/requirements.txt pytest httpx python-dotenv

      - name: Lancement des tests API
        working-directory: api
        run: pytest tests_endpoint/test_endpoint.py -v --tb=short

  # ═══════════════════════════════════════════════════════════
  # 2. BUILD DASHBOARD
  # ═══════════════════════════════════════════════════════════
  build-dashboard:
    name: Build Dashboard (React/TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package.json

      - name: Installation dépendances
        working-directory: dashboard
        run: npm install

      - name: Build production
        working-directory: dashboard
        run: npm run build

  # ═══════════════════════════════════════════════════════════
  # 3. DOCKER BUILD — vérifie que les images se construisent
  # ═══════════════════════════════════════════════════════════
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérification du build Docker Compose
        run: docker compose build
